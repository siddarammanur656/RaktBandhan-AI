AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RaktBandhan AI - Unified Backend API with Automation

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        USERS_TABLE: rb_users
        REQUESTS_TABLE: rb_requests
        DONATIONS_TABLE: rb_donations
        SCHEDULES_TABLE: rb_schedules
        AWS_REGION_CUSTOM: us-east-1

Resources:
  # The existing FastAPI Monolith
  UnifiedApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: run_local.handler
      Runtime: python3.10
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rb_users
        - DynamoDBCrudPolicy:
            TableName: rb_requests
        - DynamoDBCrudPolicy:
            TableName: rb_donations
        - DynamoDBCrudPolicy:
            TableName: rb_schedules
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - geo:SearchPlaceIndexForPosition
                - geo:SearchPlaceIndexForText
                - scheduler:CreateSchedule
                - iam:PassRole
              Resource: '*'
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["*"]
          AllowHeaders: ["*"]
          MaxAge: 86400

  # ----- AI AUTOMATION RESOURCES ----- #

  # 1. State Machine for Outreach Flow
  OutreachStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: statemachine/outreach.asl.json
      DefinitionSubstitutions:
        MatchDonorsFunctionArn: !GetAtt MatchDonorsFunction.Arn
        SendOutreachFunctionArn: !GetAtt SendOutreachFunction.Arn
        CheckResponsesFunctionArn: !GetAtt CheckResponsesFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref MatchDonorsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SendOutreachFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref CheckResponsesFunction

  # 2. DynamoDB Stream Trigger to start State Machine
  StreamTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_stream_trigger/
      Handler: main.handler
      Runtime: python3.10
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt OutreachStateMachine.Name
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref OutreachStateMachine
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: arn:aws:dynamodb:us-east-1:089679768296:table/rb_requests/stream/2026-06-06T19:38:41.371
            StartingPosition: TRIM_HORIZON
            BatchSize: 1

  # 3. Automation Lambdas
  MatchDonorsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_match_donors/
      Handler: state_machine_handler.handler
      Runtime: python3.10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rb_users
        - Statement:
            - Effect: Allow
              Action: sagemaker:InvokeEndpoint
              Resource: '*'

  SendOutreachFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_send_outreach/
      Handler: state_machine_handler.handler
      Runtime: python3.10
      Policies:
        - SESCrudPolicy:
            IdentityName: "*"
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: '*'

  CheckResponsesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_check_responses/
      Handler: state_machine_handler.handler
      Runtime: python3.10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rb_requests

  SendReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_send_reminder/
      Handler: main.handler
      Runtime: python3.10
      Policies:
        - SESCrudPolicy:
            IdentityName: "*"

  DailyReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_daily_report/
      Handler: main.handler
      Runtime: python3.10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rb_requests
        - SESCrudPolicy:
            IdentityName: "*"
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: '*'
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 21 * * ? *)
            Name: DailyReportCron

  ScheduleManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_schedule_manager/
      Handler: main.handler
      Runtime: python3.10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rb_schedules
        - DynamoDBCrudPolicy:
            TableName: rb_requests
      Events:
        DailyCheck:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 0 * * ? *)
            Name: ThalassemiaScheduleCron

  ChurnPredictorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/rb_churn_predictor/
      Handler: main.handler
      Runtime: python3.10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: rb_users
        - Statement:
            - Effect: Allow
              Action: sagemaker:InvokeEndpoint
              Resource: '*'
      Events:
        WeeklyCheck:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 2 ? * SUN *)
            Name: WeeklyChurnCron

Outputs:
  ApiUrl:
    Description: "API Endpoint URL"
    Value: !GetAtt UnifiedApiFunctionUrl.FunctionUrl
